<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Bid Qualification Screener | Rayburn Ideas</title>    <style>        :root {            --bg: #eef1f6;            --surface: #ffffff;            --surface2: #f3f6fa;            --border: #d3dae3;            --cyan: #00b3c8;            --cyan-deep: #007d8c;            --text: #1b2530;            --text-muted: #5d6b7a;            --red: #c0392b;            --orange: #b9770e;            --green: #1e8e4e;        }        * { box-sizing: border-box; margin: 0; padding: 0; }        body {            background: var(--bg);            color: var(--text);            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;            font-size: 14px;            min-height: 100vh;        }        /* ── Header ── */        header {            background: var(--surface);            border-bottom: 2px solid var(--cyan);            padding: 14px 24px;            display: flex;            align-items: center;            gap: 14px;        }        .logo-mark {            width: 38px; height: 38px;            background: var(--cyan);            border-radius: 7px;            display: flex; align-items: center; justify-content: center;            font-weight: 900; font-size: 20px; color: #ffffff;            flex-shrink: 0;        }        .logo-text strong {            display: block; font-size: 14px; letter-spacing: 0.6px; color: var(--text);        }        .logo-text span {            font-size: 10px; color: var(--cyan-deep); letter-spacing: 1.5px; text-transform: uppercase;        }        .nav-home {            color: var(--text-muted);            text-decoration: none;            font-size: 12px;            padding: 5px 10px;            border: 1px solid var(--border);            border-radius: 5px;            transition: color 0.15s, border-color 0.15s;        }        .nav-home:hover { color: var(--cyan); border-color: var(--cyan); }        .app-badge {            margin-left: auto;            background: rgba(0,179,200,0.12);            color: var(--cyan-deep);            font-size: 11px; font-weight: 600;            padding: 4px 10px; border-radius: 20px;            border: 1px solid rgba(0,179,200,0.35);            letter-spacing: 0.5px;        }        /* ── Layout ── */        .container {            max-width: 1200px;            margin: 0 auto;            padding: 20px 24px;            display: grid;            grid-template-columns: 1fr 1fr;            gap: 18px;        }        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }        .panel {            background: var(--surface);            border: 1px solid var(--border);            border-radius: 8px;            overflow: hidden;            display: flex;            flex-direction: column;        }        .panel-header {            padding: 12px 16px;            border-bottom: 2px solid var(--cyan);            font-size: 11px; font-weight: 700;            color: #f3f6fa;            text-transform: uppercase; letter-spacing: 1px;            display: flex; align-items: center; justify-content: space-between;            background: #243140;        }        .panel-header .char-count { color: #9fb0c0; }        /* ── Input ── */        textarea {            flex: 1;            min-height: 480px;            background: var(--bg);            color: var(--text);            border: none;            padding: 16px;            font-size: 14px; line-height: 1.7;            resize: vertical;            font-family: inherit;            outline: none;        }        textarea::placeholder { color: var(--text-muted); }        .input-footer {            padding: 11px 16px;            border-top: 1px solid var(--border);            display: flex; gap: 10px; align-items: center;            background: var(--surface2);        }        .btn-run {            background: var(--cyan);            color: #ffffff;            border: none; border-radius: 6px;            padding: 8px 22px;            font-size: 13px; font-weight: 700;            cursor: pointer; transition: opacity 0.15s;        }        .btn-run:hover { opacity: 0.85; }        .btn-clear {            background: transparent;            color: var(--text-muted);            border: 1px solid var(--border);            border-radius: 6px; padding: 8px 16px;            font-size: 12px; cursor: pointer;            transition: color 0.15s;        }        .btn-clear:hover { color: var(--text); }        .char-count { font-size: 11px; color: var(--text-muted); margin-left: auto; }        /* ── Platform Selector ── */        .platform-selector-row {            padding: 8px 16px;            border-bottom: 1px solid var(--border);            display: flex;            align-items: center;            gap: 12px;            background: var(--surface2);        }        .selector-label {            font-size: 11px; font-weight: 700;            color: var(--text-muted);            text-transform: uppercase; letter-spacing: 1px;            flex-shrink: 0; width: 64px;        }        #platformSelect {            background: var(--bg);            color: var(--text);            border: 1px solid var(--border);            border-radius: 4px;            padding: 5px 8px;            font-size: 12px; font-family: inherit;            cursor: pointer; flex: 1;        }        #platformSelect:focus { outline: none; border-color: var(--cyan); }        #bidUrl {            background: var(--bg);            color: var(--text);            border: 1px solid var(--border);            border-radius: 4px;            padding: 5px 8px;            font-size: 12px; font-family: inherit;            flex: 1;        }        #bidUrl:focus { outline: none; border-color: var(--cyan); }        #bidUrl::placeholder { color: var(--text-muted); }        /* ── Results ── */        .results-body {            flex: 1; padding: 18px;            overflow-y: auto;            display: flex; flex-direction: column; gap: 14px;        }        .placeholder-msg {            color: var(--text-muted);            font-size: 13px; line-height: 1.7;            text-align: center;            padding: 60px 20px;        }        /* ── Result Block ── */        .result-block {            background: var(--surface2);            border: 1px solid var(--border);            border-radius: 6px; overflow: hidden;        }        .result-block-header {            padding: 8px 14px;            font-size: 10px; font-weight: 700;            color: #2c3a47;            text-transform: uppercase; letter-spacing: 1px;            background: #e3e9f1;            border-bottom: 1px solid var(--border);        }        .result-block-body { padding: 14px; }        /* ── Platform ── */        .platform-name { font-size: 18px; font-weight: 700; color: var(--cyan-deep); }        .platform-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }        /* ── Level Bars ── */        .level-row {            display: flex; align-items: center; gap: 12px;            margin-bottom: 10px;        }        .level-row:last-child { margin-bottom: 0; }        .level-label {            width: 28px; font-size: 11px; font-weight: 700;            color: var(--text-muted); flex-shrink: 0;        }        .level-bar-track {            flex: 1; height: 8px;            background: rgba(27,37,48,0.10);            border-radius: 4px; overflow: hidden;        }        .level-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }        .l3-fill { background: var(--green); }        .l2-fill { background: var(--cyan); }        .l1-fill { background: var(--orange); }        .level-pct { width: 38px; font-size: 12px; font-weight: 700; text-align: right; flex-shrink: 0; }        .level-count { width: 64px; font-size: 11px; color: var(--text-muted); text-align: right; flex-shrink: 0; }        /* ── Decision Steps ── */        .decision-step {            display: flex; gap: 10px; align-items: flex-start;            padding: 9px 0;            border-bottom: 1px solid rgba(27,37,48,0.12);        }        .decision-step:last-child { border-bottom: none; padding-bottom: 0; }        .step-icon {            width: 20px; height: 20px; border-radius: 50%;            display: flex; align-items: center; justify-content: center;            font-size: 11px; font-weight: 900;            flex-shrink: 0; margin-top: 1px;        }        .step-pass { background: rgba(63,185,80,0.2); color: var(--green); }        .step-fail { background: rgba(248,81,73,0.2); color: var(--red); }        .step-label strong {            display: block; color: var(--text);            font-size: 12px; margin-bottom: 2px;        }        .step-label span { font-size: 11px; color: var(--text-muted); }        /* ── Red Flags ── */        .flag-item {            font-size: 12px; color: var(--red);            padding: 4px 0;            display: flex; align-items: flex-start; gap: 8px;        }        .flag-icon { flex-shrink: 0; }        .no-flags { font-size: 12px; color: var(--green); }        /* ── Verdict ── */        .verdict-display { text-align: center; padding: 20px 10px; }        .verdict-badge {            display: inline-block;            font-size: 34px; font-weight: 900;            padding: 12px 40px; border-radius: 8px;            letter-spacing: 3px;        }        .verdict-go {            background: rgba(63,185,80,0.15);            color: var(--green);            border: 2px solid var(--green);        }        .verdict-nogo {            background: rgba(248,81,73,0.15);            color: var(--red);            border: 2px solid var(--red);        }        .verdict-strong {            background: rgba(63,185,80,0.15);            color: var(--green);            border: 2px solid var(--green);        }        .verdict-borderline {            background: rgba(210,153,34,0.15);            color: var(--orange);            border: 2px solid var(--orange);            font-size: 26px;        }        .verdict-drop {            background: rgba(248,81,73,0.15);            color: var(--red);            border: 2px solid var(--red);        }        .verdict-reason {            margin-top: 10px;            font-size: 12px; color: var(--text-muted);            line-height: 1.5;        }        /* ── Case Study ── */        .case-study-card {            padding: 12px;            background: rgba(0,179,200,0.08);            border: 1px solid rgba(0,179,200,0.28);            border-radius: 6px;        }        .case-study-title {            font-size: 13px; font-weight: 700;            color: var(--cyan-deep); margin-bottom: 5px;        }        .case-study-detail { font-size: 12px; color: var(--text-muted); line-height: 1.5; }        .multi-case { display: flex; flex-direction: column; gap: 8px; }        /* ── Claude Bridge ── */        .result-block.bridge-block { border-color: rgba(63,185,80,0.4); }        .result-block.bridge-block .result-block-header {            color: var(--green);            border-bottom-color: rgba(63,185,80,0.3);        }        .bridge-body {            display: flex; flex-direction: column;            align-items: flex-start; gap: 12px;        }        .bridge-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }        .btn-copy-prompt {            background: var(--green);            color: #ffffff;            border: none; border-radius: 6px;            padding: 10px 28px;            font-size: 13px; font-weight: 700;            cursor: pointer; transition: opacity 0.15s, background 0.2s, color 0.2s;            letter-spacing: 0.3px;        }        .btn-copy-prompt:hover { opacity: 0.85; }        .btn-copy-prompt.copied { background: var(--cyan); color: #ffffff; }        .bridge-note { font-size: 11px; color: var(--text-muted); font-style: italic; }    
                /* ── Input Toolbar (top buttons) ── */
        .input-toolbar {
            padding: 11px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
            background: var(--surface2);
        }</style></head><body><header>    <div class="logo-mark">R</div>    <div class="logo-text">        <strong>RAYBURN IDEAS</strong>        <span>Identity and Access Management</span>    </div>    <a href="index.html" class="nav-home">← All Tools</a>    <div class="app-badge">APP 02</div></header><div class="container">    <!-- Left: Input -->    <div class="panel">        <div class="panel-header">            <span>Bid Posting</span>            <span id="charCount" class="char-count">0 chars</span>        </div>        <div class="platform-selector-row">            <span class="selector-label">Link</span>            <input id="bidUrl" type="url" placeholder="Paste the posting URL (optional — auto-detects platform)" />        </div>        <div class="platform-selector-row">            <span class="selector-label">Platform</span>            <select id="platformSelect">                <option value="">Auto-detect from text</option>                <option value="linkedin">LinkedIn (Job Board)</option>                <option value="dice">Dice (Job Board)</option>                <option value="glassdoor">Glassdoor (Job Board)</option>                <option value="indeed">Indeed (Job Board)</option>                <option value="monster">Monster (Job Board)</option>                <option value="ziprecruiter">ZipRecruiter (Job Board)</option>                <option value="glg">GLG</option>                <option value="catalant">Catalant</option>                <option value="mbo">MBO Partners</option>                <option value="pwc">PwC Talent Exchange</option>                <option value="gofractional">GoFractional</option>                <option value="arc">Arc.dev</option>            </select>        </div>
        <div class="input-toolbar">
            <button class="btn-run" onclick="runScreener()">Run Screener</button>
            <button class="btn-clear" onclick="clearAll()">Clear</button>
        </div>
        <textarea id="bidInput" placeholder="Paste the full bid posting here.&#10;&#10;Include the job description, platform details, questions asked, required skills, and any scope notes. The screener will detect the platform and run the full GO / NO-GO qualification guardrail."></textarea>        <div class="input-footer">            <button class="btn-run" onclick="runScreener()">Run Screener</button>            <button class="btn-clear" onclick="clearAll()">Clear</button>        </div>    </div>    <!-- Right: Results -->    <div class="panel">        <div class="panel-header">            <span>Qualification Report</span>        </div>        <div class="results-body" id="resultsBody">            <div class="placeholder-msg">                Paste a bid posting on the left.<br>                Click <strong>Run Screener</strong> to get the GO / NO-GO verdict.            </div>        </div>    </div></div><script>// ─────────────────────────────────────────────────────────────// UTILITIES// ─────────────────────────────────────────────────────────────let _claudePrompt = ''; // holds generated prompt for clipboard bridgelet _outreachShort = '', _outreachEmail = ''; // holds recruiter outreach draftsconst INPUT   = document.getElementById('bidInput');const RESULTS = document.getElementById('resultsBody');const CHARS   = document.getElementById('charCount');// Force dropdown order: Job Boards first, then Consulting Platformsfunction orderPlatformDropdown() {    const select = document.getElementById('platformSelect');    const jobBoardValues = ['linkedin', 'dice', 'glassdoor', 'indeed', 'monster', 'ziprecruiter'];    const consultingValues = ['glg', 'catalant', 'mbo', 'pwc', 'gofractional', 'arc'];    // Collect all options    const options = [...select.options];    const autoDetect = options[0]; // keep first    const jobBoards = options.filter(o => jobBoardValues.includes(o.value));    const consulting = options.filter(o => consultingValues.includes(o.value));    // Clear and rebuild in correct order    select.innerHTML = '';    select.appendChild(autoDetect);    jobBoards.forEach(opt => select.appendChild(opt));    consulting.forEach(opt => select.appendChild(opt));}// Run on page loaddocument.addEventListener('DOMContentLoaded', orderPlatformDropdown);INPUT.addEventListener('input', () => {    CHARS.textContent = INPUT.value.length.toLocaleString() + ' chars';});const URLINPUT = document.getElementById('bidUrl');URLINPUT.addEventListener('input', () => {    const hit = detectPlatformFromUrl(URLINPUT.value.trim());    if (hit) document.getElementById('platformSelect').value = hit.id;});function clearAll() {    INPUT.value = '';    CHARS.textContent = '0 chars';    _claudePrompt = '';    document.getElementById('bidUrl').value = '';    document.getElementById('platformSelect').value = '';    RESULTS.innerHTML = '<div class="placeholder-msg">Paste a bid posting on the left.<br>Click <strong>Run Screener</strong> to get the GO / NO-GO verdict.</div>';}function copyClaudePrompt() {    if (!_claudePrompt) return;    const btn = document.getElementById('btnCopyPrompt');    function onCopied() {        if (!btn) return;        btn.textContent = '✓ Copied to Clipboard';        btn.classList.add('copied');        setTimeout(() => {            btn.textContent = 'Copy Prompt for Claude';            btn.classList.remove('copied');        }, 2200);    }    if (navigator.clipboard && navigator.clipboard.writeText) {        navigator.clipboard.writeText(_claudePrompt).then(onCopied).catch(() => fallbackCopy());    } else {        fallbackCopy();    }    function fallbackCopy() {        const ta = document.createElement('textarea');        ta.value = _claudePrompt;        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';        document.body.appendChild(ta);        ta.focus();        ta.select();        try { document.execCommand('copy'); onCopied(); } catch(e) {}        document.body.removeChild(ta);    }}function copyOutreach(kind) {    const text = kind === 'short' ? _outreachShort : _outreachEmail;    const btn  = document.getElementById(kind === 'short' ? 'btnCopyShort' : 'btnCopyEmail');    if (!text) return;    function onCopied() {        if (!btn) return;        const original = btn.getAttribute('data-label') || btn.textContent;        btn.setAttribute('data-label', original);        btn.textContent = '✓ Copied';        btn.classList.add('copied');        setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 2000);    }    function fallbackCopy() {        const ta = document.createElement('textarea');        ta.value = text;        ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';        document.body.appendChild(ta);        ta.focus(); ta.select();        try { document.execCommand('copy'); onCopied(); } catch (e) {}        document.body.removeChild(ta);    }    if (navigator.clipboard && navigator.clipboard.writeText) {        navigator.clipboard.writeText(text).then(onCopied).catch(fallbackCopy);    } else {        fallbackCopy();    }}// Match keyword — use word boundary for short terms to avoid false positivesfunction matchKw(text, kw) {    if (kw.length <= 5) {        try {            const re = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');            return re.test(text);        } catch(e) { return false; }    }    return text.toLowerCase().includes(kw.toLowerCase());}// ─────────────────────────────────────────────────────────────// SCREENING LOG (feeds the Insights dashboard — deterministic, local only)// ─────────────────────────────────────────────────────────────const SCREENER_LOG_KEY = 'iam_screener_log_v1';function logScreening(rec) {    try {        rec.ts = Date.now();        const raw = localStorage.getItem(SCREENER_LOG_KEY);        const log = raw ? JSON.parse(raw) : [];        log.push(rec);        // Cap history so storage never bloats.        if (log.length > 1000) log.splice(0, log.length - 1000);        localStorage.setItem(SCREENER_LOG_KEY, JSON.stringify(log));    } catch (e) { /* storage unavailable — screening still works */ }}// ─────────────────────────────────────────────────────────────// PLATFORM DETECTION// ─────────────────────────────────────────────────────────────const PLATFORMS = [    {        id: 'glg',        name: 'GLG',        fullName: 'Gerson Lehrman Group',        format: 'RFI — 200 to 400 words per question',        keywords: ['glg', 'gerson lehrman', 'glg expert', 'glg network', 'council member', 'expert network call', '24-48 hours', '24 to 48 hours', 'glg council']    },    {        id: 'mbo',        name: 'MBO Partners',        fullName: 'MBO Partners',        format: 'RFP Proposal — 1 to 2 pages',        keywords: ['mbo partners', 'statement of work', 'request for proposal', 'master services agreement']    },    {        id: 'catalant',        name: 'Catalant',        fullName: 'Catalant',        format: 'Expert Call Brief',        keywords: ['catalant', 'expert call', 'call topic', 'call fee', 'expert network']    },    {        id: 'pwc',        name: 'PwC Talent Exchange',        fullName: 'PricewaterhouseCoopers Talent Exchange',        format: 'Rate Negotiation + Scope Summary',        keywords: ['pwc talent', 'pricewaterhousecoopers', 'talent exchange', 'daily rate', 'weekly rate']    },    {        id: 'gofractional',        name: 'GoFractional',        fullName: 'GoFractional',        format: 'Profile Match — 3 to 6 month fractional engagement',        keywords: ['gofractional', 'go fractional', 'new opportunity matched', 'fractional cto', 'fractional ciso', 'fractional engagement']    },    {        id: 'arc',        name: 'Arc.dev',        fullName: 'Arc.dev',        format: 'Advisory Only — $300+/hr',        keywords: ['arc.dev', 'arcdev', 'apply to this role']    },    {        id: 'dice',        name: 'Dice',        fullName: 'Dice (Job Board)',        format: 'WARNING: Job board posting — likely FTE or staffing firm placement. Verify direct engagement before bidding.',        keywords: ['dice.com', 'dice id:', 'dhi service', 'dhijobs', 'copyright © 1990', 'dice is a dhi']    },    {        id: 'linkedin',        name: 'LinkedIn',        fullName: 'LinkedIn Jobs',        format: 'WARNING: Job board posting — likely FTE or recruiter placement. Verify direct engagement before bidding.',        keywords: ['linkedin.com/jobs', 'linkedin job', 'easy apply', 'apply on linkedin']    },    {        id: 'indeed',        name: 'Indeed',        fullName: 'Indeed',        format: 'WARNING: Job board posting — likely FTE or staffing firm placement. Verify direct engagement before bidding.',        keywords: ['indeed.com', 'indeed job', 'posted on indeed']    },    {        id: 'glassdoor',        name: 'Glassdoor',        fullName: 'Glassdoor',        format: 'WARNING: Job board posting — likely FTE or staffing firm placement. Verify direct engagement before bidding.',        keywords: ['glassdoor.com', 'glassdoor job', 'posted on glassdoor']    },    {        id: 'monster',        name: 'Monster',        fullName: 'Monster.com',        format: 'WARNING: Job board posting — likely FTE or staffing firm placement. Verify direct engagement before bidding.',        keywords: ['monster.com', 'monster job', 'posted on monster']    },    {        id: 'ziprecruiter',        name: 'ZipRecruiter',        fullName: 'ZipRecruiter',        format: 'WARNING: Job board posting — likely FTE or staffing firm placement. Verify direct engagement before bidding.',        keywords: ['ziprecruiter.com', 'ziprecruiter', 'posted on ziprecruiter']    }];// Domain map for URL auto-detect. Hostname substring match wins.const PLATFORM_DOMAINS = {    glg:          ['glginsights.com', 'glg.it', 'glgresearch.com'],    mbo:          ['mbopartners.com'],    catalant:     ['catalant.com', 'gocatalant.com'],    pwc:          ['talentexchange.pwc.com', 'pwc.com'],    gofractional: ['gofractional.com'],    arc:          ['arc.dev'],    dice:         ['dice.com'],    linkedin:     ['linkedin.com', 'lnkd.in'],    indeed:       ['indeed.com'],    glassdoor:    ['glassdoor.com'],    monster:      ['monster.com'],    ziprecruiter: ['ziprecruiter.com']};function detectPlatform(raw) {    let best = null, bestScore = 0;    for (const p of PLATFORMS) {        let score = p.keywords.reduce((n, kw) => n + (matchKw(raw, kw) ? 1 : 0), 0);        if (score > bestScore) { bestScore = score; best = p; }    }    return bestScore > 0 ? best : null;}// Detect platform from a posting URL by hostname.function detectPlatformFromUrl(url) {    if (!url) return null;    let host = '';    try { host = new URL(url).hostname.toLowerCase(); }    catch (e) { host = url.toLowerCase(); }    for (const [id, domains] of Object.entries(PLATFORM_DOMAINS)) {        if (domains.some(d => host.includes(d))) {            return PLATFORMS.find(p => p.id === id) || null;        }    }    return null;}// ─────────────────────────────────────────────────────────────// KNOWLEDGE LEVEL KEYWORDS// ─────────────────────────────────────────────────────────────const L3 = [    'iam architecture','identity architecture','identity and access management','iam strategy','identity strategy',    'access management architecture','identity program','iam roadmap','iam maturity','iam assessment',    'jml','joiner','mover','leaver','identity lifecycle','lifecycle management','joiners movers leavers','onboarding automation',    'zero downtime','migration strategy','cutover plan','cutover strategy','zero-downtime',    'saas governance','license optimization','license harvesting','saas spend','saas capital','software asset management','license reclamation',    'active directory','ad ds','windows server','active directory domain services',    'powershell','ad automation',    'saml 2.0','saml','scim 2.0','scim','federation','single sign-on','federated identity','oauth 2.0','oidc','openid connect',    'hybrid infrastructure','hybrid infra','on-premises','on-prem','hybrid environment',    'privileged access management','privileged identity','privileged account',    'pam','mfa','multi-factor authentication','multifactor','phishing-resistant',    'provisioning','deprovisioning','access governance','access certification','access review','recertification','user access review',    'role-based access control','rbac','abac','attribute-based',    'identity governance','iga','identity governance and administration',    'zero trust','agdlp','group policy','fine grained password','fine-grained password',    'access control framework','entitlement management','separation of duties','least privilege','principle of least privilege',    'sod','jit provisioning','just in time provisioning','just-in-time'];const L2 = [    'okta','azure ad','entra id','microsoft entra','sailpoint','cyberark','forgerock','ping identity','onelogin','beyondtrust','beyond trust',    'saviynt','identitynow','sailpoint identitynow',    'soc 2','soc2','hipaa','gdpr','compliance framework','audit readiness','iso 27001','nist','cmmc','fedramp',    'cloud security','cloud iam','cloud infrastructure','cloud architecture',    'aws iam','azure active directory','google workspace',    'terraform','infrastructure as code',    'api integration','rest api','webhook','integration design',    'pam evaluation','pam product','delinea','thycotic','hashicorp vault',    'n8n','gearset','scim provisioning','scim integration'];const L1 = [    'kubernetes','k8s','docker','container orchestration',    'machine learning','deep learning','neural network',    'react framework','angular framework','frontend development','ui development',    'okta workflows developer','sailpoint connector development','connector coding',    'workflow developer','connector developer',    'data engineering','data pipeline','apache spark','kafka',    'mobile development','ios development','android development',    'gpu cluster','hardware specification',    'saviynt eic','saviynt enterprise identity c SULTS.innerHTML = html;}// ── HTML helpers ──function block(title, body, extraClass) {    return `<div class="result-block${extraClass ? ' ' + extraClass : ''}">        <div class="result-block-header">${title}</div>        <div class="result-block-body">${body}</div>    </div>`;}function levelRow(label, color, fillClass, pct, count, desc) {    return `<div class="level-row">        <div class="level-label" style="color:${color}">${label}</div>        <div class="level-bar-track">            <div class="level-bar-fill ${fillClass}" style="width:${pct}%"></div>        </div>        <div class="level-pct" style="color:${color}">${pct}%</div>        <div class="level-count">${count} signal${count !== 1 ? 's' : ''}</div>    </div>`;}function step(pass, label, detail) {    return `<div class="decision-step">        <div class="step-icon ${pass ? 'step-pass' : 'step-fail'}">${pass ? '✓' : '✗'}</div>        <div class="step-label">            <strong>${label}</strong>            <span>${detail}</span>        </div>    </div>`;}</script></body></html>
